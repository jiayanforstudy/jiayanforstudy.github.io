<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // GitHub Pages SPA redirect
    // Capture the path and redirect to index.html with the path as a hash
    var path = window.location.pathname;
    var repo = '/fitness-website'; // 如果你的仓库名不同，请修改
    if (path.indexOf(repo) === 0) {
      path = path.substring(repo.length);
    }
    window.location.replace(repo + '/#' + path + window.location.search);
  </script>
</head>
<body>
  Redirecting...
</body>
</html>
